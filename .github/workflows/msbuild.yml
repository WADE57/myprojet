name: C Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Compile C sources
      run: |
        mkdir -p build
        gcc -std=c11 -Wall -Wextra -pedantic cprep.c -o build/cprep
        gcc -std=c11 -Wall -Wextra -pedantic wade.c -o build/wade